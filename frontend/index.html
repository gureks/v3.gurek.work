<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gurek.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Security Headers (enforced via meta — supplement server-level headers in production) -->
    <!--
      Content Security Policy:
      - default-src 'self'         : Only load resources from same origin by default
      - script-src 'self' 'unsafe-inline' (Vite dev only) + trusted CDNs
      - style-src  'self' 'unsafe-inline' fonts.googleapis.com
      - img-src    'self' data: https: (images from CDNs/Unsplash/devicons)
      - font-src   'self' fonts.gstatic.com
      - connect-src 'self' localhost:* (API calls; tighten to domain in prod)
      - frame-src  'none'          : Block iframes entirely
      - object-src 'none'          : Block <object>/<embed>
      - base-uri   'self'          : Prevent base tag hijacking
      - form-action 'self'         : Restrict form targets
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        img-src 'self' data: https: blob:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' http://localhost:* https://localhost:* https://gurek.work https://v2.gurek.work wss://localhost:*;
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
      "
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Primary SEO Meta -->
    <title>Gurek Singh — Product Generalist & AI-Native Builder</title>
    <meta name="description" content="Gurek Singh — Product Generalist, UX Systems Designer, and AI-Native Builder with 5+ years across Product Strategy, AI Feature Development, and Design Systems." />
